<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOB Webflow — local test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 640px;
            margin: 2rem auto;
            padding: 0 1.25rem;
            line-height: 1.6;
        }
        .status {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0f4f8;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <h1>OOB Webflow starter</h1>
    <p>Open DevTools → Console. You should see <code>[OOB] Script loaded v1.0.0</code>.</p>
    <div class="status" id="status">Waiting for script…</div>
    <script src="oob.js"></script>
    <script>
        setTimeout(function () {
            document.getElementById('status').textContent =
                'Check the console for [OOB] logs.';
        }, 500);
    </script>
</body>
</html>
